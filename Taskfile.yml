version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install bun dev dependencies
    cmds:
      - bun install

  typecheck:
    desc: TypeScript check (no emit)
    cmds:
      - bunx tsc --noEmit

  build:
    desc: Compile TypeScript to dist/
    cmds:
      - bunx tsc

  test:unit:
    desc: Run unit tests (bun:test, headless-CI friendly)
    cmds:
      - bun test

  test:smoke:
    desc: Smoke test (typecheck, session registry, gnome-session-inhibit)
    cmds:
      - ./scripts/smoke-test.sh

  test:
    desc: Run unit tests then smoke tests
    deps: [test:unit, test:smoke]

  docker:build:
    desc: Build dev container image (PROFILE=ubuntu2404)
    cmds:
      - docker build -t opencode-suspend-inhibitor-dev:${PROFILE:-ubuntu2404} -f docker/Dockerfile.${PROFILE:-ubuntu2404} docker/

  docker:up:
    desc: Start integration test services (opencode-server + mock-llm)
    cmds:
      - docker compose -f docker/docker-compose.yml up -d --build --wait

  docker:down:
    desc: Stop integration test services
    cmds:
      - docker compose -f docker/docker-compose.yml down

  container:run:
    desc: Run dev container with repo bind-mounted (interactive shell)
    deps: [docker:build]
    cmds:
      - docker run -it --rm -v "$PWD:/workspace/opencode-suspend-inhibitor:rw" -e PLUGIN_DIR=/workspace/opencode-suspend-inhibitor opencode-suspend-inhibitor-dev:${PROFILE:-ubuntu2404}

  test:integration:
    desc: Run integration tests (opencode-server + mock LLM sidecar)
    deps: [docker:up]
    cmds:
      - ./scripts/integration-test.sh

  beads:ready:
    desc: Show unblocked beads issues
    cmds:
      - bd ready

  beads:list:flat:
    desc: List beads issues (flat, one line per issue with type)
    aliases: [beads:list]
    cmds:
      - bd list --flat

  beads:list:tree:
    desc: List beads issues (hierarchical tree)
    cmds:
      - bd list

  beads:blocked:
    desc: Show issues blocked by open dependencies
    cmds:
      - bd blocked

  beads:push:
    desc: Push beads state to Dolt remote
    cmds:
      - bd dolt push

  bdui:start:
    desc: Start beads-ui web dashboard (default http://127.0.0.1:3000)
    cmds:
      - bdui start

  bdui:stop:
    desc: Stop beads-ui web dashboard
    cmds:
      - bdui stop

  gsi:list:all:
    desc: List all active gnome-session-inhibit inhibitors
    aliases: [gsi:list]
    cmds:
      - gnome-session-inhibit --list

  gsi:list:plugin:
    desc: List plugin inhibitors only (ai.opencode.desktop)
    cmds:
      - gnome-session-inhibit --list 2>/dev/null | grep "ai.opencode" || echo "(none)"

  gsi:orphans:
    desc: Show plugin gnome-session-inhibit processes (PID + args)
    cmds:
      - pgrep -af "gnome-session-inhibit.*ai.opencode" || echo "(none)"

  gsi:sessions:
    desc: Show session files and their stored PIDs
    cmds:
      - |
        DIR=/tmp/opencode-suspend-inhibitor/sessions
        if [ ! -d "$DIR" ] || [ -z "$(ls -A "$DIR" 2>/dev/null)" ]; then
          echo "(no session files)"
        else
          for f in "$DIR"/*; do
            echo "$(basename "$f") -> $(cat "$f")"
          done
        fi

  gsi:kill:
    desc: Kill all plugin gnome-session-inhibit processes
    cmds:
      - pkill -TERM -f "gnome-session-inhibit.*ai.opencode" && echo "killed" || echo "(none running)"

  gsi:reset:
    desc: "Full reset: kill orphans, clear session files, remove pid file"
    deps: [gsi:kill]
    cmds:
      - rm -rf /tmp/opencode-suspend-inhibitor/sessions/
      - rm -f /tmp/opencode-suspend-inhibitor/gnome-session-inhibit.pid
      - echo "reset complete"