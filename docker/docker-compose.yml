name: osi

services:
  mock-llm:
    image: ghcr.io/dwmkerr/mock-llm
    networks:
      - test-net
    healthcheck:
      test: wget -q -O - http://127.0.0.1:6556/health | grep -q healthy
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu2404
    ports:
      - "${OPENCODE_PORT:-4096}:4096"
    volumes:
      - ..:/workspace/opencode-suspend-inhibitor:rw
    depends_on:
      mock-llm:
        condition: service_healthy
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:4096/global/health"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s

networks:
  test-net:
