version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install bun dev dependencies
    cmds:
      - bun install

  typecheck:
    desc: TypeScript check (no emit)
    cmds:
      - bunx tsc --noEmit

  test:
    desc: Smoke test (typecheck, session registry, gnome-session-inhibit)
    cmds:
      - ./scripts/smoke-test.sh

  container:build:
    desc: Build dev container image (PROFILE=ubuntu2404)
    cmds:
      - docker build -t opencode-suspend-inhibitor-dev:${PROFILE:-ubuntu2404} -f docker/Dockerfile.${PROFILE:-ubuntu2404} docker/

  container:run:
    desc: Run dev container with repo bind-mounted (interactive shell)
    deps: [container:build]
    cmds:
      - docker run -it --rm -v "$PWD:/workspace/opencode-suspend-inhibitor:rw" -e PLUGIN_DIR=/workspace/opencode-suspend-inhibitor -e VERIFY_ON_START=${VERIFY_ON_START:-1} opencode-suspend-inhibitor-dev:${PROFILE:-ubuntu2404}

  container:verify:
    desc: Verify dev container toolchain and plugin config (non-interactive)
    deps: [container:build]
    cmds:
      - docker run --rm -v "$PWD:/workspace/opencode-suspend-inhibitor:rw" -e PLUGIN_DIR=/workspace/opencode-suspend-inhibitor -e VERIFY_ON_START=0 opencode-suspend-inhibitor-dev:${PROFILE:-ubuntu2404} /opt/container/verify.sh

  beads:ready:
    desc: Show unblocked beads issues
    cmds:
      - bd ready

  beads:list:flat:
    desc: List beads issues (flat, one line per issue with type)
    aliases: [beads:list]
    cmds:
      - bd list --flat

  beads:list:tree:
    desc: List beads issues (hierarchical tree)
    cmds:
      - bd list

  beads:blocked:
    desc: Show issues blocked by open dependencies
    cmds:
      - bd blocked

  beads:push:
    desc: Push beads state to Dolt remote
    cmds:
      - bd dolt push

  bdui:start:
    desc: Start beads-ui web dashboard (default http://127.0.0.1:3000)
    cmds:
      - bdui start

  bdui:stop:
    desc: Stop beads-ui web dashboard
    cmds:
      - bdui stop