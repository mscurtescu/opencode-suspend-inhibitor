name: osi

services:
  mock-llm:
    image: ghcr.io/dwmkerr/mock-llm
    networks:
      - test-net
    healthcheck:
      test: wget -q -O - http://127.0.0.1:6556/health | grep -q healthy
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  dev:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu2404
    volumes:
      - ..:/workspace/opencode-suspend-inhibitor:rw
    environment:
      - MOCK_LLM_URL=http://mock-llm:6556/v1
      - VERIFY_ON_START=0
    command:
      - /workspace/opencode-suspend-inhibitor/scripts/integration-test.sh
    depends_on:
      mock-llm:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
